name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  psscriptanalyzer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser

      - name: Run PSScriptAnalyzer (warnings — informational)
        shell: pwsh
        run: |
          $excludes = @(
            'PSAvoidUsingWriteHost',
            'PSUseShouldProcessForStateChangingFunctions',
            'PSAvoidGlobalVars',
            'PSReviewUnusedParameter',
            'PSUseDeclaredVarsMoreThanAssignments',
            'PSAvoidUsingEmptyCatchBlock',
            'PSAvoidAssignmentToAutomaticVariable',
            'PSUseApprovedVerbs',
            'PSUseSingularNouns',
            'PSAvoidUsingPositionalParameters',
            'PSPossibleIncorrectComparisonWithNull',
            'PSAvoidUsingInvokeExpression',
            'PSAvoidUsingConvertToSecureStringWithPlainText',
            'PSAvoidOverwritingBuiltInCmdlets',
            'PSUseProcessBlockForPipelineCommand',
            'PSUseBOMForUnicodeEncodedFile',
            'PSAvoidTrailingWhitespace'
          )

          $warnings = Invoke-ScriptAnalyzer -Path . -Recurse -Severity 'Warning'  -ExcludeRule $excludes
          $errors   = Invoke-ScriptAnalyzer -Path . -Recurse -Severity 'Error'    -ExcludeRule $excludes

          if ($warnings) {
            Write-Host '::warning::PSScriptAnalyzer found warnings:'
            $warnings | Format-Table -AutoSize ScriptName, Line, RuleName, Message
          }

          if ($errors) {
            Write-Host '::error::PSScriptAnalyzer found errors:'
            $errors | Format-Table -AutoSize ScriptName, Line, RuleName, Message
            exit 1
          }

          Write-Host 'PSScriptAnalyzer: no errors.'

  validate-json:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON
        run: |
          set -e
          for f in src/data/*.json src/data/locales/*.json; do
            echo "Checking $f"
            python3 -c "import json,sys; json.load(open('$f', encoding='utf-8'))"
          done
          echo 'All JSON files are valid.'
