name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  psscriptanalyzer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path . -Recurse -Severity @('Error','Warning') `
            -ExcludeRule PSAvoidUsingWriteHost,PSUseShouldProcessForStateChangingFunctions,PSAvoidGlobalVars,PSReviewUnusedParameter
          if ($results) {
            $results | Format-Table -AutoSize
            exit 1
          }
          Write-Host 'PSScriptAnalyzer: clean.'

  validate-json:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON
        run: |
          set -e
          for f in src/data/*.json src/data/locales/*.json; do
            echo "Checking $f"
            python3 -c "import json,sys; json.load(open('$f', encoding='utf-8'))"
          done
          echo 'All JSON files are valid.'
